<!DOCTYPE html>
<html>
<head>
    <title>javascript 02</title>

    <script>
        alert("you clicked refresh or reloaded the page.");


        function clickMe() {
            let firstNum = prompt("Enter 1st number : ");
            let secondNum = prompt("Enter 2nd number : ");

            let sum = parseFloat(firstNum) + parseFloat(secondNum);

            alert("Answer is : " + sum);
        }
    </script>
</head>

<body>
    <button onclick="return clickMe()">
        Click me to add 2 numbers
    </button>
</body>
</html>
