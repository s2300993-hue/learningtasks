<html>
    <head>
            <title>..:basic html layout:..</title>
            <style type="text/css">
                .wrapper {
                    background-color: #CCCCCC;
                }
                .header {
                    background-color: blue;
                    height: 200px;
                    color: white;
                }
                .body {
                    min-height: 200px;
                    color: white;
                }
                .navigation {
                    background-color: red;
                    width: 25%;
                    height: 200px;
                    float: left;
                }
                .content {
                    background-color: green;
                    width: 75%;
                    height: 200px;
                    float: right;
                }
                .footer {
                    background-color: grey;
                    height: 100px;
                }
            </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="header">
                header
            </div>
            <div class="body">
                <div class="navigation">navigation</div>
                <div class="content">content</div>
            </div>
            <div class="footer">footer</div>
        </div>
    </body>
</html>
