<html>
    <head>
        <title>..:4 boxes:..</title>
        <style type="text/css">
            body{
                background-color: grey;
            }
            .wrapper {
                background-color: FFF;
                width: 400px;
                height: 400px;
                border-left: 2px solid #f5425a;
                border-right: 2px solid #f542c2;
                border-top: 2px solid #5142f5;
                border-bottom: 2px solid #5142f5;
                margin: 0 auto;
            }
            .wrapper div {
                color: fff;
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                width: 192px;
                height: 192px;
                margin: 2px;
                border: 2px solid red;
                float: left;
            }
            .box-1 {
                background-color: darkgoldenrod;
            }
            .box-2 {
                background-color: dimgrey;
            }
            .box-3 {
                background-color: red;
            }
            .box-4 {
                background-color: bisque;
            }

        </style>
    </head>
    <body>
        <div class="wrapper">
            <div class="box-1">1</div>
            <div class="box-2">2</div>
            <div class="box-3">3</div>
            <div class="box-4">4</div>

        </div>
    </body>
</html>
